name: CI-CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install frontend deps
        run: npm ci
      - name: Build frontend
        run: npm run build
        env:
          VITE_TOKEN: ${{ secrets.VITE_TOKEN }}
          DISABLE_PWA: "true"
      - name: Install backend deps
        run: npm ci
        working-directory: backend
      - name: Build frontend image
        run: docker build --build-arg VITE_TOKEN=${{ secrets.VITE_TOKEN }} --build-arg VITE_API_BASE_URL=/api -t movie-time-frontend:ci .
      - name: Build backend image
        run: docker build -t movie-time-backend:ci ./backend

  deploy-render:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
